<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-container">
        <img src="assets/logo.png" alt="Avaami Logo" class="main-logo">
      </div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Please enter your details to sign in</p>
    </div>

    <div class="error-banner" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
      <div class="form-group">
        <label>Official Email Address</label>
        <input type="email" formControlName="email" placeholder="name@company.com"
               [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        <small class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email address.
        </small>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label>Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" formControlName="password" placeholder="••••••••"
               [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid">
        <span>Log In</span>
      </button>

      <div class="auth-footer">
        <p>Don't have an account? <a routerLink="/signup">Sign up</a></p>
      </div>
    </form>
  </div>
</div>
